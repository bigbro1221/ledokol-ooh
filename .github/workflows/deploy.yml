name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Ensure app directory exists
            mkdir -p /opt/ooh-dashboard
            cd /opt/ooh-dashboard

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true

            # Pull latest image
            docker pull ghcr.io/bigbro1221/ledokol-ooh:latest || {
              echo "Failed to pull image — check GHCR permissions"
              exit 1
            }

            # Start/update services
            if [ -f docker-compose.yml ]; then
              docker compose pull
              docker compose up -d
            else
              echo "No docker-compose.yml found at /opt/ooh-dashboard"
              echo "Copy docker-compose.prod.yml from the repo and create .env first"
              exit 1
            fi

            # Wait for health
            sleep 8
            curl -sf http://localhost:3000/api/health || {
              echo "Health check failed"
              docker compose logs app --tail 20
              exit 1
            }

            echo "Deploy successful"
