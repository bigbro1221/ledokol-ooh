name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [release]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Ensure app directory exists
            mkdir -p /opt/ooh-dashboard
            cd /opt/ooh-dashboard

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true

            # Pull latest image
            docker pull ghcr.io/bigbro1221/ledokol-ooh:latest || {
              echo "Failed to pull image — check GHCR permissions"
              exit 1
            }

            # Start/update services
            if [ -f docker-compose.yml ]; then
              docker compose pull
              docker compose up -d
            else
              echo "No docker-compose.yml found at /opt/ooh-dashboard"
              echo "Copy docker-compose.prod.yml from the repo and create .env first"
              exit 1
            fi

            # Wait for health — poll for up to 60s
            echo "Waiting for app to become healthy..."
            HEALTH_URL="http://localhost:3100/api/health"
            for i in $(seq 1 30); do
              if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
                echo "App is healthy after ${i}x2s"
                curl -s "$HEALTH_URL"
                echo ""
                echo "Deploy successful"
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed after 60s"
            docker compose ps
            docker compose logs app --tail 40
            exit 1
